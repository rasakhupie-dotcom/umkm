<head>

  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    .pareto-rank { display:flex;align-items:center;gap:4px;width:28px;height:28px;border-radius:50%;background:var(--bg-overlay);font-family:var(--font-mono);font-size:11px;font-weight:700;justify-content:center;flex-shrink:0; }
    .pareto-rank.gold   { background:rgba(212,175,55,.2);color:#D4AF37; }
    .pareto-rank.silver { background:rgba(192,192,192,.2);color:#C0C0C0; }
    .pareto-rank.bronze { background:rgba(205,127,50,.2);color:#CD7F32; }
    .insight-box { background:var(--bg-elevated);border-left:3px solid var(--accent-green);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:12px 16px;margin-bottom:8px;font-size:12px;color:var(--text-secondary);line-height:1.5; }
    .insight-box.warn { border-left-color:var(--accent-amber); }
    .insight-box.danger { border-left-color:var(--accent-red); }
    .locked-notice{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center;color:var(--text-muted)}
    .locked-notice .lock-icon{font-size:48px;margin-bottom:16px;opacity:.4}
    .locked-notice h3{font-size:16px;color:var(--text-secondary);margin-bottom:8px}
  </style>
<script>
  // Auth Guard — redirect ke login jika belum login
  (function() {
    var s = sessionStorage.getItem('warkop_session');
    if (!s) { window.location.href = '../login.html'; return; }
    try { var sess = JSON.parse(s); if (Date.now() > sess.expiresAt) { sessionStorage.removeItem('warkop_session'); window.location.href = '../login.html'; } }
    catch(e) { window.location.href = '../login.html'; }
  })();
</script>
</head>

<main class="main">
  <header class="topbar">
    <div class="topbar-left">
      <button class="menu-toggle" onclick="window.WarkopApp.toggleSidebar()"><span></span><span></span><span></span></button>
      <h1 class="page-title">Analisis Pareto</h1>
    </div>
    <div class="topbar-right">
      <div class="clock-display" id="clockDisplay">—</div>

      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;">
        <span id="syncStatus" style="font-size:10px;font-weight:700;color:var(--accent-amber);cursor:pointer;"
          onclick="window.WarkopSync?.showConfigModal()" title="Klik untuk konfigurasi sync">
          ○ Belum terhubung
        </span>
        <span id="lastSync" style="font-size:9px;color:var(--text-muted);font-family:var(--font-mono);">Klik untuk setup</span>
      </div>
    </div>
  </header>
  <div class="page-content" id="pageContent"></div>
</main>

<div class="toast" id="toast"></div>
<script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
<script>
// Static demo data for Pareto
const paretoMenus = [
  { nama:'Es Kopi Susu', qty:28, rev:504000, hpp:205800, emoji:'☕' },
  { nama:'Kopi Hitam',   qty:18, rev:180000, hpp:36000,  emoji:'☕' },
  { nama:'Matcha Latte', qty:12, rev:264000, hpp:117600, emoji:'🍵' },
  { nama:'Indomie Telur',qty:10, rev:150000, hpp:74400,  emoji:'🍜' },
  { nama:'Roti Bakar',   qty:8,  rev:96000,  hpp:28000,  emoji:'🍞' },
  { nama:'Air Mineral',  qty:7,  rev:35000,  hpp:17500,  emoji:'💧' },
  { nama:'Snack Chitato',qty:4,  rev:48000,  hpp:28000,  emoji:'🍿' },
];

const paretoBahan = [
  { nama:'Susu Cair',    pct:28, cost:201600 },
  { nama:'Kopi Bubuk',   pct:22, cost:158400 },
  { nama:'Gula Aren',    pct:17, cost:122400 },
  { nama:'Es Batu',      pct:12, cost:86400  },
  { nama:'Gas LPG',      pct:8,  cost:57600  },
  { nama:'Cup Plastik',  pct:7,  cost:50400  },
  { nama:'Lainnya',      pct:6,  cost:43200  },
];

function initPage() {
  const app = window.WarkopApp;
  const content = document.getElementById('pageContent');
  if (app.state.role !== 'owner') {
    content.innerHTML = `<div class="locked-notice"><div class="lock-icon">🔒</div><h3>Akses Terbatas</h3><p>Analisis Pareto hanya untuk Owner.</p></div>`;
    return;
  }

  const totalRev = paretoMenus.reduce((s,m) => s+m.rev, 0);
  const totalHPP = paretoMenus.reduce((s,m) => s+m.hpp*m.qty/m.qty, 0); // per menu
  const top3Rev = paretoMenus.slice(0,3).reduce((s,m)=>s+m.rev,0);
  const top3Pct = (top3Rev/totalRev*100).toFixed(1);

  content.innerHTML = `
    <div class="metrics-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:16px">
      <div class="metric-card metric-green" data-animate="fade-up" style="--delay:0ms">
        <div class="metric-label">Top 3 Menu</div>
        <div class="metric-value">${top3Pct}%</div>
        <div class="metric-delta positive">dari total revenue</div>
      </div>
      <div class="metric-card metric-blue" data-animate="fade-up" style="--delay:60ms">
        <div class="metric-label">Fast Moving Items</div>
        <div class="metric-value">3</div>
        <div class="metric-delta">produk dominan</div>
      </div>
      <div class="metric-card metric-amber" data-animate="fade-up" style="--delay:120ms">
        <div class="metric-label">Slow Moving Items</div>
        <div class="metric-value">4</div>
        <div class="metric-delta negative">perlu evaluasi</div>
      </div>
    </div>

    <div class="grid-2">
      <div class="card" data-animate="fade-up" style="--delay:180ms">
        <div class="card-header"><h2 class="card-title">Pareto Revenue Menu</h2><span class="badge badge-success">80/20 Rule</span></div>
        <div id="paretoRevBars"></div>
        <div style="margin-top:14px">
          <div class="insight-box">✓ <strong>Es Kopi Susu + Matcha + Kopi Hitam</strong> = ${top3Pct}% total revenue. Pastikan bahan ketiga menu ini selalu tersedia.</div>
          <div class="insight-box warn">⚡ <strong>Snack & Air Mineral</strong> hanya menyumbang 6% revenue — pertimbangkan promosi atau kurangi SKU.</div>
        </div>
      </div>

      <div class="card" data-animate="fade-up" style="--delay:240ms">
        <div class="card-header"><h2 class="card-title">Pareto Bahan Baku Terpakai</h2><span class="badge badge-warning">Kontrol biaya</span></div>
        <div id="paretoBahanBars"></div>
        <div style="margin-top:14px">
          <div class="insight-box danger">⚠ <strong>Susu + Kopi Bubuk</strong> = 50% total biaya bahan. Kontrol ketat kedua item ini untuk jaga margin.</div>
          <div class="insight-box">✓ Lakukan negosiasi harga dengan supplier Susu & Kopi untuk penghematan biaya signifikan.</div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-bottom:14px" data-animate="fade-up" style="--delay:300ms">
      <div class="card-header"><h2 class="card-title">Ranking Lengkap Menu — Revenue & Profit</h2></div>
      <div style="overflow-x:auto">
        <table class="data-table">
          <thead><tr><th>Rank</th><th>Menu</th><th>Qty Terjual</th><th>Revenue</th><th>% Revenue</th><th>Profit</th><th>Margin</th><th>Kategori</th></tr></thead>
          <tbody id="paretoTable"></tbody>
        </table>
      </div>
    </div>
  `;

  renderParetoBars();
  renderParetoTable(totalRev);
  document.querySelectorAll('[data-animate]').forEach(el => setTimeout(()=>el.classList.add('visible'),50));
}

const barColors = ['#1D9E75','#3B82F6','#8B5CF6','#F59E0B','#EF4444','#6B7280','#94A3B8'];

function renderParetoBars() {
  const app = window.WarkopApp;
  const totalRev = paretoMenus.reduce((s,m)=>s+m.rev,0);
  document.getElementById('paretoRevBars').innerHTML = paretoMenus.map((m,i) => {
    const pct = (m.rev/totalRev*100).toFixed(1);
    const w = (m.rev/paretoMenus[0].rev*100);
    return `<div class="pareto-item" style="margin-bottom:8px">
      <span class="pareto-label">${m.emoji} ${m.nama}</span>
      <div class="pareto-track"><div class="pareto-fill" style="width:${w}%;--clr:${barColors[i]}">${pct}%</div></div>
    </div>`;
  }).join('');

  document.getElementById('paretoBahanBars').innerHTML = paretoBahan.map((b,i) => `
    <div class="pareto-item" style="margin-bottom:8px">
      <span class="pareto-label">${b.nama}</span>
      <div class="pareto-track"><div class="pareto-fill" style="width:${b.pct/paretoBahan[0].pct*100}%;--clr:${barColors[i]}">${b.pct}%</div></div>
    </div>
  `).join('');
}

function renderParetoTable(totalRev) {
  const app = window.WarkopApp;
  let cumul = 0;
  document.getElementById('paretoTable').innerHTML = paretoMenus.map((m, i) => {
    const revPct = (m.rev/totalRev*100).toFixed(1);
    cumul += m.rev;
    const cumulPct = (cumul/totalRev*100).toFixed(1);
    const profit = m.rev - m.hpp;
    const margin = ((profit/m.rev)*100).toFixed(1);
    const cat = i < 2 ? 'Fast Moving' : i < 5 ? 'Normal' : 'Slow Moving';
    const catCls = i < 2 ? 'badge-success' : i < 5 ? 'badge-info' : 'badge-warning';
    const rankCls = i===0?'gold':i===1?'silver':i===2?'bronze':'';
    return `<tr>
      <td><div class="pareto-rank ${rankCls}">${i+1}</div></td>
      <td><span style="margin-right:6px">${m.emoji}</span><strong>${m.nama}</strong></td>
      <td class="mono">${m.qty} pcs</td>
      <td class="mono">${app.fmt(m.rev)}</td>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:60px;height:5px;background:var(--bg-overlay);border-radius:99px;overflow:hidden">
            <div style="width:${revPct}%;height:100%;background:${barColors[i]};border-radius:99px"></div>
          </div>
          <span class="mono" style="font-size:11px">${revPct}%</span>
        </div>
      </td>
      <td class="mono" style="color:var(--accent-green)">${app.fmt(profit)}</td>
      <td class="mono" style="font-weight:700;color:${parseFloat(margin)>=40?'var(--accent-green)':parseFloat(margin)>=20?'var(--accent-amber)':'var(--accent-red)'}">${margin}%</td>
      <td><span class="badge ${catCls}" style="font-size:10px">${cat}</span></td>
    </tr>`;
  }).join('');
}

document.addEventListener('DOMContentLoaded', () => {
  const origSwitch = window.WarkopApp.switchRole;
  window.WarkopApp.switchRole = function(role) { origSwitch(role); initPage(); };
  initPage();
});
</script>
  <script src="../js/api.js"></script>
  <script src="../js/sync.js"></script>
</body>
</html>
