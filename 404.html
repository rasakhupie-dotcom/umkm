<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WarkopPOS — Halaman Tidak Ditemukan</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root { --accent-green: #1D9E75; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #0F0E0C;
      color: #F0EDE6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .wrap { max-width: 400px; }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h1 { font-family: 'Space Mono', monospace; font-size: 18px; margin-bottom: 8px; color: var(--accent-green); }
    p { font-size: 14px; color: #8C8880; margin-bottom: 24px; line-height: 1.6; }
    a {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px;
      background: var(--accent-green);
      color: #fff;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: background .2s;
    }
    a:hover { background: #15875F; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">☕</div>
    <h1>404 — Halaman Tidak Ditemukan</h1>
    <p>Halaman yang kamu cari tidak ada atau telah dipindahkan.<br>Kembali ke dashboard utama WarkopPOS.</p>
    <a href="/warkop-dashboard/">← Kembali ke Dashboard</a>
  </div>
</body>
</html>
